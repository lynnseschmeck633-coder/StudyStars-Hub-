<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyStars Hub</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #1d3557;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      background: #457b9d;
      text-align: center;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 250px;
      border: none;
    }

<body>

<header>
  <h1>StudyStars Hub</h1>
  <p>Shining a Light on Student Learning</p>

<nav>
  <a href="#dashboard">Dashboard</a>
  <a href="#resources">Resources</a>
</nav>

<section id="dashboard">
  <h2>Student Dashboard</h2>
  <p>Track your progress and learning.</p>
</section>

<section id="resources">
  <h2>Learning Resources</h2>

  <div class="card">
    <h3>📘 Study Guides</h3>
    <p>Download PDFs:</p>

    <ul>
      <li><a href="pdfs/algebra.pdf" target="_blank">Algebra Guide</a></li>
      <li><a href="pdfs/science.pdf" target="_blank">Science Notes</a></li>
    </ul>
  </div>

  <div class="card">
